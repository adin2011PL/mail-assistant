<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speedeck Mail Assistant</title>
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#F3F3F3;color:#323130;font-size:13px;line-height:1.5}
.hdr{display:flex;align-items:center;gap:10px;padding:12px 16px;background:#0078D4;color:#fff}
.hdr-logo{width:30px;height:30px;border-radius:4px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700}
.hdr h1{font-size:14px;font-weight:600}
.hdr p{font-size:10px;opacity:.75}
.status{padding:6px 16px;background:#fff;border-bottom:1px solid #EDEBE9;font-size:11px;color:#605E5C;display:flex;align-items:center;gap:6px}
.dot{width:6px;height:6px;border-radius:50%}
.dot-ok{background:#107C10}
.dot-err{background:#D13438}
.wrap{padding:14px 16px}
.lbl{display:block;font-size:10px;font-weight:600;color:#605E5C;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.api-in{width:100%;padding:7px 10px;border-radius:3px;border:1px solid #EDEBE9;background:#fff;color:#323130;font-size:12px;font-family:'Segoe UI',sans-serif}
.api-in:focus{outline:none;border-color:#0078D4;box-shadow:0 0 0 1px #0078D4}
.note{font-size:9px;color:#A19F9D;margin-top:3px;line-height:1.4}
.divider{height:1px;background:#EDEBE9;margin:10px 0}
.preview{background:#fff;border:1px solid #EDEBE9;border-radius:4px;padding:8px 10px;font-size:11px;color:#A19F9D;max-height:100px;overflow-y:auto;line-height:1.5;margin-bottom:10px}
.preview.has{color:#323130}

/* Summary box */
.sum-box{background:#fff;border:1px solid #EDEBE9;border-radius:4px;padding:10px 12px;margin-bottom:10px;display:none}
.sum-box.vis{display:block}
.sum-title{font-size:10px;font-weight:600;color:#0078D4;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.sum-text{font-size:12px;line-height:1.6;color:#323130;margin-bottom:8px}
.act-title{font-size:10px;font-weight:600;color:#107C10;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.act-list{font-size:12px;line-height:1.6;color:#323130;padding-left:16px;margin:0}
.act-list li{margin-bottom:2px}

/* Mode chips */
.mode-chips{display:flex;gap:4px;margin-bottom:10px}
.mode-chip{flex:1;padding:7px;border-radius:4px;border:1px solid #EDEBE9;background:#fff;color:#605E5C;font-size:12px;font-weight:500;cursor:pointer;font-family:'Segoe UI',sans-serif;text-align:center}
.mode-chip:hover{background:#FAF9F8}
.mode-chip.on{border-color:#0078D4;background:#EFF6FC;color:#0078D4}

/* Lang chips */
.lang-chips{display:flex;gap:4px;margin-bottom:10px}
.lang-chip{flex:1;padding:5px;border-radius:4px;border:1px solid #EDEBE9;background:#fff;color:#605E5C;font-size:11px;font-weight:500;cursor:pointer;font-family:'Segoe UI',sans-serif;text-align:center}
.lang-chip:hover{background:#FAF9F8}
.lang-chip.on{border-color:#0078D4;background:#EFF6FC;color:#0078D4}

.chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.chip{padding:4px 9px;border-radius:3px;border:1px solid #EDEBE9;background:#fff;color:#605E5C;font-size:11px;cursor:pointer;font-family:'Segoe UI',sans-serif}
.chip:hover{border-color:#C8C6C4;background:#FAF9F8}
.chip.on{border-color:#0078D4;background:#EFF6FC;color:#0078D4;font-weight:600}
.btn-go{width:100%;padding:9px;border-radius:4px;border:none;background:#0078D4;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:'Segoe UI',sans-serif;margin-top:2px;margin-bottom:6px}
.btn-go:hover{background:#106EBE}
.btn-go:disabled{background:#C8C6C4;cursor:default}
.dots{display:flex;gap:5px;justify-content:center;padding:16px 0}
.dot-l{width:6px;height:6px;border-radius:50%;background:#0078D4;animation:b 1.2s ease-in-out infinite}
.dot-l:nth-child(2){animation-delay:.15s}
.dot-l:nth-child(3){animation-delay:.3s}
@keyframes b{0%,80%,100%{transform:scale(.6);opacity:.3}40%{transform:scale(1);opacity:1}}
.card{background:#fff;border:1px solid #EDEBE9;border-radius:4px;margin-bottom:5px;overflow:hidden}
.card.open{border-color:#0078D4}
.card-h{width:100%;display:flex;align-items:center;gap:8px;padding:8px 10px;background:transparent;border:none;cursor:pointer;text-align:left;color:#323130;font-family:'Segoe UI',sans-serif}
.card-h:hover{background:#FAF9F8}
.card-n{width:20px;height:20px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.card-l{font-weight:600;font-size:12px}
.card-d{font-size:10px;color:#A19F9D;margin-top:1px}
.card-a{font-size:12px;color:#A19F9D;margin-left:auto;transition:transform .15s}
.card-a.open{transform:rotate(180deg)}
.card-b{padding:0 10px 10px}
.resp{background:#FAF9F8;border:1px solid #EDEBE9;border-radius:3px;padding:10px;font-size:12px;line-height:1.7;white-space:pre-wrap;color:#323130;font-family:Calibri,'Segoe UI',sans-serif}
.btns{display:flex;gap:5px;margin-top:7px}
.btn-c,.btn-i{padding:5px 12px;border-radius:3px;border:none;font-size:11px;font-weight:600;cursor:pointer;font-family:'Segoe UI',sans-serif}
.btn-c{background:#0078D4;color:#fff}
.btn-c:hover{background:#106EBE}
.btn-c.ok{background:#107C10}
.btn-i{background:#fff;color:#0078D4;border:1px solid #0078D4}
.btn-i:hover{background:#EFF6FC}
.err{padding:8px 10px;background:#FDE7E9;border:1px solid #D13438;border-radius:4px;color:#A4262C;font-size:11px;margin-top:8px}
.info{margin-top:8px;padding:7px 10px;background:#EFF6FC;border-radius:4px;font-size:10px;color:#0050A0;line-height:1.4}
.key-saved{display:flex;align-items:center;gap:6px;padding:7px 10px;background:#E6F4EA;border:1px solid #A8DAB5;border-radius:4px;font-size:11px;color:#137333;margin-bottom:8px}
.key-saved button{background:none;border:none;font-size:10px;cursor:pointer;text-decoration:underline;padding:0;margin-left:4px}
.key-saved .kch{color:#0078D4}
.key-saved .krm{color:#A4262C}
.btn-save{margin-top:4px;padding:5px 12px;border-radius:3px;border:none;background:#107C10;color:#fff;font-size:11px;font-weight:600;cursor:pointer}
.btn-save:hover{background:#0E6B0E}
</style>
</head>
<body>

<div class="hdr">
<div class="hdr-logo">S</div>
<div>
<h1>Speedeck Mail Assistant</h1>
<p>AI-powered response drafts</p>
</div>
</div>

<div id="st" class="status" style="display:none">
<span id="sd" class="dot"></span>
<span id="stx"></span>
</div>

<div class="wrap">

<!-- API Key -->
<span class="lbl">API Key</span>
<div id="keySaved" class="key-saved" style="display:none">
<span>&#9989; Saved</span>
<button class="kch" id="keyChange">Change</button>
<button class="krm" id="keyClear">Remove</button>
</div>
<div id="keyInput">
<input type="password" id="key" class="api-in" placeholder="sk-ant-...">
<div class="note">Saved permanently. Get one at console.anthropic.com</div>
<button class="btn-save" id="keySaveBtn">Save Key</button>
</div>

<div class="divider"></div>

<!-- Email -->
<span class="lbl">Current Email</span>
<div id="ep" class="preview">Open an email and click "Draft Response" to load it here...</div>

<!-- Summary -->
<div class="sum-box" id="sumBox">
<div class="sum-title">&#128203; Summary</div>
<div class="sum-text" id="sumText"></div>
<div class="act-title">&#9989; Action items</div>
<ul class="act-list" id="actList"></ul>
</div>

<!-- Mode -->
<span class="lbl">Mode</span>
<div class="mode-chips">
<button class="mode-chip on" id="mReply">&#8617; Reply</button>
<button class="mode-chip" id="mFwd">&#8618; Forward</button>
</div>

<!-- Language -->
<span class="lbl">Language</span>
<div class="lang-chips">
<button class="lang-chip" id="lPl">&#127477;&#127473; Polski</button>
<button class="lang-chip on" id="lEn">&#127468;&#127463; English</button>
</div>

<!-- Category -->
<span class="lbl">Category</span>
<div class="chips" id="cats"></div>

<!-- Tone -->
<span class="lbl">Response Tone</span>
<div class="chips" id="tones"></div>

<button class="btn-go" id="go" disabled>Generate Response Options</button>

<div class="dots" id="ld" style="display:none">
<div class="dot-l"></div><div class="dot-l"></div><div class="dot-l"></div>
</div>

<div class="err" id="er" style="display:none"></div>
<div id="res"></div>

</div>

<script>
var CATS=[{id:"technical",label:"Technical"},{id:"programme",label:"Programme"},{id:"scope",label:"Scope"},{id:"rfi",label:"RFI"},{id:"site",label:"Site Issue"},{id:"general",label:"General"}];
var TONES=[{id:"friendly",label:"Friendly"},{id:"firm",label:"Firm & Direct"},{id:"collaborative",label:"Collaborative"}];

var SYS_REPLY_EN="You are an AI email assistant for Adrian Natonek, Structural Engineer at Speedeck Foundations in the UK.\n\nROLE CONTEXT:\n- Name: Adrian Natonek MTech(Hons) CEng\n- Position: Structural Engineer, Team lead / coordination\n- Company: SPEEDECK Foundations Ltd. (subcontractor for foundations and ground-related structures)\n- Team: 9 engineers\n- Responsibilities: structural design, verification, foundations, technical coordination with main contractor/client, reviewing drawings/specs, managing team workload, resolving site issues, programme alignment, risk identification\n\nWRITING STYLE (MANDATORY):\n- B2-level UK English (clear, not overly complex vocabulary)\n- Friendly but professional\n- Structured and practical\n- Decision-oriented - always move things forward\n- Concise but complete\n- No unnecessary corporate jargon\n- Use UK spelling (e.g. programme, behaviour, colour)\n- Be commercially aware when needed but don't be aggressive\n\nEMAIL FORMAT (MANDATORY):\n- Start with a greeting like \"Hi [Name],\" or \"Dear [Name],\"\n- Write the body text in clear paragraphs, keep responses SHORT (max 3-4 short paragraphs)\n- DO NOT include any signature block. No \"Kind regards\", no name, no contact details.\n\nRESPONSE FORMAT (CRITICAL):\nRespond ONLY with valid JSON. No markdown, no backticks.\nKeep each response body SHORT (under 150 words).\n{\"responses\": [{\"label\": \"Short label\", \"body\": \"Email body only\", \"notes\": \"When to use\"}]}\nGenerate exactly 3 options.";

var SYS_REPLY_PL="You are an AI email assistant for Adrian Natonek, Structural Engineer at Speedeck Foundations in the UK.\n\nROLE CONTEXT:\n- Name: Adrian Natonek MTech(Hons) CEng\n- Position: Structural Engineer, Team lead / coordination\n- Company: SPEEDECK Foundations Ltd.\n- Team: 9 engineers\n\nWRITING STYLE (MANDATORY):\n- Write in POLISH language\n- Friendly but professional\n- Structured and practical\n- Decision-oriented\n- Concise but complete\n- No unnecessary corporate jargon\n\nEMAIL FORMAT (MANDATORY):\n- Start with \"Cze\u015B\u0107 [Name],\" or \"Dzie\u0144 dobry,\" based on context\n- Write in clear paragraphs, keep responses SHORT (max 3-4 short paragraphs)\n- DO NOT include any signature. No \"Pozdrawiam\", no name, no contact details.\n\nRESPONSE FORMAT (CRITICAL):\nRespond ONLY with valid JSON. No markdown, no backticks.\nKeep each response body SHORT (under 150 words).\n{\"responses\": [{\"label\": \"Short label in Polish\", \"body\": \"Email body in Polish only\", \"notes\": \"When to use (in Polish)\"}]}\nGenerate exactly 3 options.";

var SYS_FWD_EN="You are an AI email assistant for Adrian Natonek, Structural Engineer at Speedeck Foundations in the UK.\n\nROLE CONTEXT:\n- Name: Adrian Natonek MTech(Hons) CEng\n- Company: SPEEDECK Foundations Ltd.\n\nTASK: Write a SHORT forwarding message in English to accompany the forwarded email.\n\nSTYLE: B2-level UK English, friendly but professional, concise - explain why forwarding and what action needed. Max 2-3 short sentences. NO signature.\n\nRESPONSE FORMAT:\nValid JSON only. No markdown.\n{\"responses\": [{\"label\": \"Short label\", \"body\": \"Forwarding message only\", \"notes\": \"When to use\"}]}\nGenerate exactly 3 options.";

var SYS_FWD_PL="You are an AI email assistant for Adrian Natonek, Structural Engineer at Speedeck Foundations in the UK.\n\nROLE CONTEXT:\n- Name: Adrian Natonek MTech(Hons) CEng\n- Company: SPEEDECK Foundations Ltd.\n\nTASK: Write a SHORT forwarding message in POLISH to accompany the forwarded email.\n\nSTYLE: Write in POLISH. Friendly but professional. Concise - explain why forwarding and what action needed. Max 2-3 short sentences. NO signature (no \"Pozdrawiam\").\n\nRESPONSE FORMAT:\nValid JSON only. No markdown.\n{\"responses\": [{\"label\": \"Label in Polish\", \"body\": \"Message in Polish\", \"notes\": \"When to use (Polish)\"}]}\nGenerate exactly 3 options.";

var SYS_SUMMARY="You are an AI assistant for a Structural Engineer. Analyze the email and provide:\n1. A brief summary (2-3 sentences max)\n2. A list of action items / things that need to be done\n\nRespond ONLY with valid JSON:\n{\"summary\": \"Brief summary\", \"actions\": [\"Action 1\", \"Action 2\"]}\nIf no actions needed, return empty actions array. Keep concise. Write in English.";

var ABG=["#EFF6FC","#F0FFF0","#FFF8E5"];
var AFG=["#0078D4","#107C10","#CA5010"];

var cat="technical",tone="friendly",mode="reply",lang="en",ebody="",subj="",openC=null,apiKey="";

// ==================== JSON REPAIR ====================
function tryParseJSON(str){
str=str.trim().replace(/```json\s*/g,"").replace(/```\s*/g,"");
try{return JSON.parse(str)}catch(e){}
var start=str.indexOf("{"),end=str.lastIndexOf("}");
if(start>=0&&end>start){
var j=str.substring(start,end+1);
try{return JSON.parse(j)}catch(e){}
var f=j,ins=false;
for(var i=0;i<f.length;i++){if(f[i]==='"'&&(i===0||f[i-1]!=='\\'))ins=!ins}
if(ins)f+='"';
var ob=(f.match(/\[/g)||[]).length-(f.match(/\]/g)||[]).length;
var oc=(f.match(/\{/g)||[]).length-(f.match(/\}/g)||[]).length;
for(var x=0;x<ob;x++)f+="]";for(var x=0;x<oc;x++)f+="}";
try{return JSON.parse(f)}catch(e){}
try{
var rs=[],labels=[],bodies=[],notes=[],m,re;
re=/"label"\s*:\s*"([^"]*?)"/g;while(m=re.exec(str))labels.push(m[1]);
re=/"notes"\s*:\s*"([^"]*?)"/g;while(m=re.exec(str))notes.push(m[1]);
var bp=str.split(/"body"\s*:\s*"/);
for(var bi=1;bi<bp.length;bi++){var be=bp[bi].search(/"\s*,\s*"notes"/);if(be>0)bodies.push(bp[bi].substring(0,be));else{be=bp[bi].search(/"\s*}/);if(be>0)bodies.push(bp[bi].substring(0,be))}}
if(labels.length>0&&bodies.length>0){for(var ri=0;ri<Math.min(labels.length,bodies.length);ri++){rs.push({label:labels[ri],body:bodies[ri]?bodies[ri].replace(/\\n/g,"\n").replace(/\\"/g,'"'):"",notes:notes[ri]||""})}if(rs.length>0)return{responses:rs}}
}catch(e){}}
return null;
}

// ==================== API KEY ====================
function loadKey(){try{var s=localStorage.getItem("speedeck_api_key");if(s){apiKey=s;document.getElementById("keySaved").style.display="flex";document.getElementById("keyInput").style.display="none";return true}}catch(e){}return false}
function saveKey(){var k=document.getElementById("key").value.trim();if(!k||!k.startsWith("sk-")){showErr("Enter valid key (sk-ant-...)");return}try{localStorage.setItem("speedeck_api_key",k);apiKey=k;document.getElementById("keySaved").style.display="flex";document.getElementById("keyInput").style.display="none";hideErr()}catch(e){showErr("Could not save: "+e.message)}}
function changeKey(){document.getElementById("keySaved").style.display="none";document.getElementById("keyInput").style.display="block";document.getElementById("key").value="";document.getElementById("key").focus()}
function clearKey(){try{localStorage.removeItem("speedeck_api_key")}catch(e){}apiKey="";document.getElementById("keySaved").style.display="none";document.getElementById("keyInput").style.display="block";document.getElementById("key").value=""}

document.getElementById("keySaveBtn").onclick=saveKey;
document.getElementById("keyChange").onclick=changeKey;
document.getElementById("keyClear").onclick=clearKey;
document.getElementById("key").onkeydown=function(e){if(e.key==="Enter")saveKey()};
loadKey();

// ==================== MODE & LANG ====================
document.getElementById("mReply").onclick=function(){mode="reply";this.classList.add("on");document.getElementById("mFwd").classList.remove("on")};
document.getElementById("mFwd").onclick=function(){mode="forward";this.classList.add("on");document.getElementById("mReply").classList.remove("on")};
document.getElementById("lPl").onclick=function(){lang="pl";this.classList.add("on");document.getElementById("lEn").classList.remove("on")};
document.getElementById("lEn").onclick=function(){lang="en";this.classList.add("on");document.getElementById("lPl").classList.remove("on")};

// ==================== OUTLOOK ====================
Office.onReady(function(i){if(i.host===Office.HostType.Outlook){loadEmail();stat("Connected to Outlook",true)}});

function loadEmail(){
try{
var it=Office.context.mailbox.item;subj=it.subject||"";
it.body.getAsync(Office.CoercionType.Text,function(r){
if(r.status===Office.AsyncResultStatus.Succeeded){
ebody=r.value.trim();
if(ebody.length>2000)ebody=ebody.substring(0,2000);
var p=document.getElementById("ep");
if(ebody){p.textContent=ebody.substring(0,400)+(ebody.length>400?"...":"");p.classList.add("has");document.getElementById("go").disabled=false;genSummary()}
else{p.textContent="No email body found."}
}
});
}catch(e){stat("Could not read email: "+e.message,false)}
}

function stat(t,ok){document.getElementById("st").style.display="flex";document.getElementById("sd").className="dot "+(ok?"dot-ok":"dot-err");document.getElementById("stx").textContent=t}

// ==================== SUMMARY ====================
async function genSummary(){
var k=apiKey||document.getElementById("key").value.trim();
if(!k||!ebody)return;
var box=document.getElementById("sumBox"),st=document.getElementById("sumText"),al=document.getElementById("actList");
st.textContent="Analysing...";al.innerHTML="";box.classList.add("vis");
try{
var r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":k,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:SYS_SUMMARY,messages:[{role:"user",content:"Email:\n---\n"+ebody+"\n---\n\nProvide summary and action items. Valid JSON only."}]})});
var d=await r.json();if(d.error)throw new Error(d.error.message);
var tx=d.content.map(function(b){return b.text||""}).join("");
var p=tryParseJSON(tx);
if(p&&p.summary){
st.textContent=p.summary;al.innerHTML="";
if(p.actions&&p.actions.length>0){p.actions.forEach(function(a){var li=document.createElement("li");li.textContent=a;al.appendChild(li)})}
else{var li=document.createElement("li");li.textContent="No specific actions required.";li.style.color="#A19F9D";al.appendChild(li)}
}else{st.textContent="Could not generate summary."}
}catch(e){st.textContent="Summary unavailable."}
}

// ==================== CHIPS ====================
function chips(cid,items,sel,fn){var el=document.getElementById(cid);el.innerHTML="";items.forEach(function(it){var b=document.createElement("button");b.className="chip"+(it.id===sel?" on":"");b.textContent=it.label;b.onclick=function(){fn(it.id);chips(cid,items,it.id,fn)};el.appendChild(b)})}
chips("cats",CATS,cat,function(id){cat=id});
chips("tones",TONES,tone,function(id){tone=id});

// ==================== GENERATE ====================
document.getElementById("go").onclick=async function(){
var k=apiKey||document.getElementById("key").value.trim();
if(!k){showErr("Please save your API key first.");return}
if(!ebody){showErr("No email loaded.");return}

var btn=document.getElementById("go"),ld=document.getElementById("ld"),res=document.getElementById("res");
btn.disabled=true;btn.textContent="Generating...";ld.style.display="flex";res.innerHTML="";hideErr();

var sys;
if(mode==="reply"&&lang==="en")sys=SYS_REPLY_EN;
else if(mode==="reply"&&lang==="pl")sys=SYS_REPLY_PL;
else if(mode==="forward"&&lang==="en")sys=SYS_FWD_EN;
else sys=SYS_FWD_PL;

var cl=CATS.find(function(c){return c.id===cat}).label;
var tl=TONES.find(function(t){return t.id===tone}).label;
var ml=mode==="reply"?"REPLY to":"FORWARD message for";
var prompt="Subject: "+subj+"\nCategory: "+cl+"\nPreferred tone: "+tl+"\nMode: "+ml+"\n\nOriginal email:\n---\n"+ebody+"\n---\n\nGenerate 3 SHORT "+mode+" options (max 150 words each). Body text only, NO signature. Return valid JSON only.";

try{
var r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":k,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:4096,system:sys,messages:[{role:"user",content:prompt}]})});
var d=await r.json();if(d.error)throw new Error(d.error.message||"API error");
var tx=d.content.map(function(b){return b.text||""}).join("");
var p=tryParseJSON(tx);
if(!p||!p.responses||p.responses.length===0)throw new Error("Could not parse. Try again.");
render(p.responses);
}catch(e){showErr("Error: "+e.message)}
finally{btn.disabled=false;btn.textContent="Generate Response Options";ld.style.display="none"}
};

// ==================== FORMAT & COPY ====================
function textToHtml(text){var ps=text.split(/\n\n+/),h="";for(var i=0;i<ps.length;i++){h+='<p style="margin:0 0 12px 0;font-family:Calibri,sans-serif;font-size:12pt;color:#000000;">'+ps[i].replace(/\n/g,"<br>")+"</p>"}return h}

function copyFormatted(text,idx){
var html=textToHtml(text);var c=document.createElement("div");c.innerHTML=html;c.style.position="fixed";c.style.left="-9999px";c.style.top="-9999px";document.body.appendChild(c);
var range=document.createRange();range.selectNodeContents(c);var sel=window.getSelection();sel.removeAllRanges();sel.addRange(range);
try{document.execCommand("copy");var b=document.getElementById("cp"+idx);b.textContent="\u2713 Copied!";b.classList.add("ok");setTimeout(function(){b.textContent="Copy";b.classList.remove("ok")},2000)}catch(e){navigator.clipboard.writeText(text)}
sel.removeAllRanges();document.body.removeChild(c);
}

// ==================== RENDER ====================
function render(rs){
var c=document.getElementById("res");c.innerHTML="";openC=null;
rs.forEach(function(r,i){
var card=document.createElement("div");card.className="card";card.id="c"+i;
var h=document.createElement("button");h.className="card-h";
h.innerHTML='<div class="card-n" style="background:'+ABG[i]+';color:'+AFG[i]+'">'+(i+1)+'</div><div style="flex:1;min-width:0"><div class="card-l">'+esc(r.label)+'</div><div class="card-d">'+esc(r.notes)+'</div></div><span class="card-a" id="a'+i+'">&#9662;</span>';
h.onclick=function(){toggle(i)};card.appendChild(h);

var bd=document.createElement("div");bd.className="card-b";bd.id="b"+i;bd.style.display="none";
var tx=document.createElement("div");tx.className="resp";tx.textContent=r.body;bd.appendChild(tx);
var btns=document.createElement("div");btns.className="btns";

var cp=document.createElement("button");cp.className="btn-c";cp.id="cp"+i;cp.textContent="Copy";
cp.onclick=function(e){e.stopPropagation();copyFormatted(r.body,i)};

var ins=document.createElement("button");ins.className="btn-i";
ins.textContent=mode==="reply"?"Insert Reply":"Insert Forward";
ins.onclick=function(e){e.stopPropagation();insertOutlook(r.body)};

btns.appendChild(cp);btns.appendChild(ins);bd.appendChild(btns);card.appendChild(bd);c.appendChild(card);
});
var info=document.createElement("div");info.className="info";
info.textContent="\u2139\uFE0F Copied as Calibri 12pt. Your Outlook signature will be added automatically.";
c.appendChild(info);
}

function toggle(i){
var bd=document.getElementById("b"+i),ar=document.getElementById("a"+i),cd=document.getElementById("c"+i);
if(openC===i){bd.style.display="none";ar.classList.remove("open");cd.classList.remove("open");openC=null}
else{if(openC!==null){document.getElementById("b"+openC).style.display="none";document.getElementById("a"+openC).classList.remove("open");document.getElementById("c"+openC).classList.remove("open")}bd.style.display="block";ar.classList.add("open");cd.classList.add("open");openC=i}
}

function insertOutlook(t){
var html=textToHtml(t);
try{
if(mode==="forward"){Office.context.mailbox.item.displayReplyForm(html);stat("Reply form opened (use Forward manually)",true)}
else{Office.context.mailbox.item.displayReplyForm(html);stat("Reply form opened!",true)}
}catch(e){stat("Could not open form: "+e.message,false)}
}

function showErr(m){var e=document.getElementById("er");e.textContent=m;e.style.display="block"}
function hideErr(){document.getElementById("er").style.display="none"}
function esc(s){var d=document.createElement("div");d.textContent=s;return d.innerHTML}
</script>
</body>
</html>
